<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nebula Calligraphy</title>
    <link rel="stylesheet" href="/app/styles.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="workspace">
        <header class="brand">
          <div>
            <p class="eyebrow">Nebula Calligraphy</p>
            <h1>集字创作工作台</h1>
          </div>
          <span id="status" class="status">待预览</span>
        </header>

        <section class="panel auth-panel">
          <div class="panel-head">
            <h2>账号</h2>
            <button id="logoutButton" type="button" class="ghost">退出</button>
          </div>
          <p id="authState" class="meta">未登录</p>
          <p id="authMode" class="meta">认证模式：加载中</p>
          <div class="grid two">
            <label>
              用户名
              <input id="authUsername" value="learner" autocomplete="username" />
            </label>
            <label>
              密码
              <input id="authPassword" type="password" value="secret123" autocomplete="current-password" />
            </label>
          </div>
          <div class="actions two-actions">
            <button id="registerButton" type="button">注册</button>
            <button id="loginButton" type="button" class="ghost">登录</button>
          </div>
          <input id="ownerUserId" type="hidden" value="" />
        </section>

        <section class="panel">
          <label>
            当前用户
            <input id="ownerDisplay" value="未登录" readonly />
          </label>

          <label>
            正文
            <textarea id="textInput" rows="5">山水清音</textarea>
          </label>

          <div class="grid two">
            <label>
              书体
              <select id="styleInput">
                <option value="ou">欧体</option>
                <option value="yan">颜体</option>
              </select>
            </label>
            <label>
              幅式
              <select id="formatInput">
                <option value="doufang">斗方</option>
                <option value="tiaofu">条幅</option>
                <option value="zhongtang">中堂</option>
              </select>
            </label>
          </div>

          <div class="grid three">
            <label>
              宽 cm
              <input id="widthInput" type="number" min="10" step="1" value="69" />
            </label>
            <label>
              高 cm
              <input id="heightInput" type="number" min="10" step="1" value="68" />
            </label>
            <label>
              边距 cm
              <input id="marginInput" type="number" min="1" step="0.5" value="3" />
            </label>
          </div>

          <div class="grid two">
            <label>
              落款
              <input id="signatureInput" value="试作" autocomplete="off" />
            </label>
            <label>
              印章
              <input id="sealInput" type="number" min="0" max="4" step="1" value="1" />
            </label>
          </div>

          <div class="actions">
            <button id="previewButton" type="button">预览</button>
            <button id="saveButton" type="button">保存草稿</button>
            <button id="exportButton" type="button">导出 SVG</button>
          </div>
        </section>

        <section class="panel glyph-search">
          <div class="panel-head">
            <h2>查字</h2>
            <button id="glyphSearchButton" type="button" class="ghost">查询</button>
          </div>
          <div class="grid two">
            <label>
              单字
              <input id="glyphInput" value="山" maxlength="1" autocomplete="off" />
            </label>
            <label>
              书体
              <select id="glyphStyleInput">
                <option value="ou">欧体</option>
                <option value="yan">颜体</option>
              </select>
            </label>
          </div>
          <ul id="glyphResults" class="result-list"></ul>
          <div id="glyphDetail" class="glyph-detail empty">选择一个字查看结构和练习模板</div>
          <div class="preset-groups">
            <div class="panel-head">
              <h2>常用字</h2>
              <button id="presetRefreshButton" type="button" class="ghost">载入</button>
            </div>
            <div id="presetGroups"></div>
          </div>
        </section>

        <section class="panel learning">
          <div class="panel-head">
            <h2>学习档案</h2>
            <button id="learningRefreshButton" type="button" class="ghost">刷新</button>
          </div>
          <div id="learningStats" class="stats-row">
            <span>收藏 0</span>
            <span>练习 0</span>
          </div>
          <div class="learning-grid">
            <div>
              <h3>收藏字</h3>
              <ul id="favoriteList" class="compact-list"></ul>
            </div>
            <div>
              <h3>最近练习</h3>
              <ul id="practiceList" class="compact-list"></ul>
            </div>
          </div>
        </section>

        <section class="panel drafts">
          <div class="panel-head">
            <h2>草稿</h2>
            <button id="refreshButton" type="button" class="ghost">刷新</button>
          </div>
          <ul id="draftList"></ul>
        </section>
      </aside>

      <section class="preview">
        <div class="preview-toolbar">
          <div>
            <p id="layoutMeta" class="meta">尚未生成章法</p>
            <h2 id="artworkTitle">作品预览</h2>
          </div>
          <a id="downloadLink" class="download" download="calligraphy.svg" hidden>下载</a>
        </div>
        <div id="previewSurface" class="paper"></div>
        <section class="export-history">
          <div class="panel-head">
            <h2>导出记录</h2>
          </div>
          <ul id="exportList" class="result-list"></ul>
        </section>
      </section>
    </main>

    <script src="/app/app.js" defer></script>
  </body>
</html>
